[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; 串口监视器与上传速率配置
monitor_speed = 115200
upload_speed = 115200

; 编译选项：增加最大 MQTT 数据包大小为 65536 字节（64KB）以支持传输 JPEG 图片
build_flags = 
    -DCORE_DEBUG_LEVEL=5
    -DMQTT_MAX_PACKET_SIZE=200000

; 上传与调试协议配置
upload_protocol = esptool
monitor_filters = time
monitor_dtr = 0
monitor_rts = 0

lib_deps =
    ; PubSubClient 使用本地 PSRAM fork（lib/PubSubClient/），已将 uint16_t 改为 uint32_t并使用 PSRAM
    ; 原始外部库已删除，PlatformIO 自动发现 lib/ 目录
